name: Vital
options:
  bundleIdPrefix: com.vital
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"

targets:
  Vital:
    type: application
    platform: iOS
    sources:
      - Vital
    dependencies:
      - package: Supabase
    settings:
      base:
        INFOPLIST_FILE: Vital/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.vital.health
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: Vital/Vital.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.developer.healthkit.background-delivery: true
    info:
      path: Vital/Info.plist
      properties:
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "Vital syncs your Apple Health data to your personal health dashboard for tracking trends in HRV, heart rate, sleep, workouts, and more."
        NSHealthUpdateUsageDescription: "Vital does not write data to Apple Health."
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.vital.health.sync
