name: Vital
options:
  bundleIdPrefix: com.vital
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"

targets:
  Vital:
    type: application
    platform: iOS
    sources:
      - Vital
    dependencies:
      - package: Supabase
    settings:
      base:
        INFOPLIST_FILE: Vital/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cesario.vital
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "26"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: A3W539C4C3
    entitlements:
      path: Vital/Vital.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    info:
      path: Vital/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleIconName: AppIcon
        # Use build-setting templates so bumps to MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION above propagate. Without these here,
        # xcodegen auto-fills literal "1.0" / "1" and clobbers the fix.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Vital uses your camera to photograph meals for AI-powered nutrition analysis."
        NSPhotoLibraryUsageDescription: "Vital accesses your photo library so you can select meal photos for nutrition analysis."
        NSHealthShareUsageDescription: "Vital syncs your Apple Health data to your personal health dashboard for tracking trends in HRV, heart rate, sleep, workouts, and more."
        NSHealthUpdateUsageDescription: "Vital does not write data to Apple Health."
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.cesario.vital.sync
